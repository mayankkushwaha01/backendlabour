# Railway configuration for backend-only
# https://docs.railway.app/guides/railway-toml

[build]
buildCommand = "npm install --include=dev && npm install -g tsx && npx prisma generate"

[deploy]
startCommand = "npx prisma db push && tsx src/server.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
NODE_ENV = "production"
NODE_VERSION = "20"
