# Railway configuration for backend-only
# https://docs.railway.app/guides/railway-toml

[build]
buildCommand = "npm install --include=dev && npx prisma generate"

[deploy]
startCommand = "npx prisma db push && npx tsx src/server.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
